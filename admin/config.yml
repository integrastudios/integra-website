backend:
  name: github
  repo: integrastudios/integra-website
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "journal"
    label: "Journal Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g. Energy Science, Reiki, Sound Healing" }
      - { label: "Intro", name: "intro", widget: "text", hint: "The short description shown in the journal grid" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "pages"
    label: "Page Content"
    files:
      - label: "Homepage"
        name: "home"
        file: "_data/home.json"
        fields:
          - { label: "Hero Credential Line", name: "credential", widget: "string" }
          - { label: "About Emma — Paragraph 1", name: "about1", widget: "text" }
          - { label: "About Emma — Paragraph 2", name: "about2", widget: "text" }
          - { label: "Testimonial Quote", name: "testimonial", widget: "text" }
          - { label: "Testimonial Attribution", name: "testimonial_attr", widget: "string" }
          - { label: "Single Session Price", name: "price_single", widget: "number" }
          - { label: "3 Session Pack Price", name: "price_3pack", widget: "number" }
          - { label: "5 Session Pack Price", name: "price_5pack", widget: "number" }
